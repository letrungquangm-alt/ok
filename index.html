<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HoangKiet - Tra cứu thông tin gói ảnh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --paper: #ffffff;
      --bg: #f8fafc;
      --green: #176b52;
      --green-2: #0f4d3b;
      --copper: #b66a2c;
      --blue: #2563eb;
      --red: #dc2626;
      --gold: #d97706;
      --shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 16px -6px rgba(15, 23, 42, 0.03);
      --shadow-hover: 0 20px 35px -5px rgba(15, 23, 42, 0.12), 0 12px 24px -8px rgba(15, 23, 42, 0.06);
      --gradient-sidebar: linear-gradient(135deg, #112c22 0%, #071510 100%);
      --gradient-primary: linear-gradient(135deg, #176b52 0%, #0f4d3b 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      background: var(--gradient-sidebar);
      color: #f8fafc;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.05);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
      color: #0f766e;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 8px 16px rgba(13, 148, 136, 0.15);
      animation: logoPulse 3s infinite ease-in-out;
    }

    @keyframes logoPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .nav-title {
      color: #63786d;
      font-size: 11px;
      font-weight: 800;
      margin: 22px 10px 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav {
      flex: 1;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 10px;
      color: #a3b8cc;
      padding: 11px 14px;
      margin: 6px 0;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav a.active {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 4px 12px rgba(0, 0, 0, 0.15);
      font-weight: 600;
    }

    .nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      transform: translateX(6px);
    }

    @keyframes dotPulse {
      0% { box-shadow: 0 0 0 0 rgba(143, 199, 173, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(143, 199, 173, 0); }
      100% { box-shadow: 0 0 0 0 rgba(143, 199, 173, 0); }
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8fc7ad;
      flex: 0 0 auto;
      animation: dotPulse 2s infinite ease-in-out;
    }

    .main {
      padding: 24px 32px 48px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      min-height: 48px;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .user:hover {
      background: rgba(15, 23, 42, 0.04);
      color: var(--ink);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #e6f4ea 0%, #c2e7d9 100%);
      color: var(--green-2);
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(23, 107, 82, 0.1);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user:hover .avatar {
      transform: rotate(360deg);
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--ink);
    }

    .hero {
      background:
        linear-gradient(120deg, rgba(23, 107, 82, 0.95), rgba(15, 77, 59, 0.9)),
        url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600&q=80");
      background-position: center;
      background-size: cover;
      border-radius: 16px;
      color: #fff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 32px;
      min-height: 280px;
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: 32px;
      line-height: 1.15;
      margin: 0 0 12px;
      max-width: 720px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .hero p {
      color: #e2f1ea;
      font-size: 15px;
      margin: 0;
      max-width: 680px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      align-items: center;
      border-radius: 10px;
      display: inline-flex;
      font-weight: 600;
      justify-content: center;
      min-height: 42px;
      padding: 10px 18px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      background: #ffffff;
      color: var(--green-2);
      font-weight: 700;
    }

    .btn.primary:hover {
      background: #f8fafc;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.35);
    }

    .btn.ghost {
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .btn.ghost:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #ffffff;
    }

    .hero-card {
      align-self: end;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    .hero-card strong {
      display: block;
      font-size: 32px;
      margin-top: 5px;
      font-weight: 800;
      color: #ffffff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
      margin: 24px 0;
    }

    .metric,
    .panel {
      background: var(--paper);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .metric:hover,
    .panel:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(203, 213, 225, 0.8);
    }

    .metric {
      padding: 20px;
    }

    .label {
      color: var(--muted);
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 30px;
      font-weight: 800;
      color: var(--ink);
    }

    .trend {
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      margin-top: 7px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.7fr);
      gap: 20px;
    }

    .panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .panel h2 {
      font-size: 20px;
      margin: 0;
      font-weight: 700;
    }

    .pill {
      border-radius: 999px;
      display: inline-flex;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .pill.blue { background: #dbeafe; color: #1d4ed8; }
    .pill.green { background: #d1fae5; color: #047857; }
    .pill.gold { background: #fef3c7; color: #b45309; }
    .pill.red { background: #fee2e2; color: #b91c1c; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 720px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 14px 12px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid var(--line);
    }

    tr {
      transition: background-color 0.2s ease;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .table-wrap { overflow-x: auto; }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .step {
      border-left: 3px solid var(--green);
      padding: 2px 0 2px 14px;
    }

    .step strong { display: block; font-weight: 600; }
    .step span { color: var(--muted); font-size: 13px; }

    .api-box {
      background: #0f172a;
      border-radius: 12px;
      color: #e2e8f0;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      overflow-x: auto;
      padding: 16px;
      white-space: pre;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .menu-toggle { display: block; }
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
        z-index: 10001; transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar.open { transform: translateX(0); }
      .hero,
      .content-grid,
      .metrics { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .main { padding: 16px; min-width: 0; overflow-x: hidden; }
      .topbar { flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
      .hero { padding: 24px; }
      .hero h1 { font-size: 24px; }
    }

    @media (max-width: 576px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 20px;
        min-height: auto;
        gap: 20px;
      }
      .hero-card {
        align-self: stretch;
        margin-top: 8px;
      }
      .metrics {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin: 16px 0;
      }
      .metric {
        padding: 14px;
      }
      .value {
        font-size: 22px;
      }
      .label {
        font-size: 11px;
        margin-bottom: 6px;
      }
      .trend {
        font-size: 11px;
      }
      .panel {
        padding: 16px;
      }
      .panel h2 {
        font-size: 16px;
      }
      th, td {
        padding: 10px 8px;
        font-size: 13px;
      }
      .main {
        padding: 12px 12px 32px;
        min-width: 0;
        overflow-x: hidden;
      }
    }

    .split-layout {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
      transition: all 0.3s ease;
    }

    @media (min-width: 981px) {
      .split-layout.has-form { grid-template-columns: minmax(0, 1fr) 340px; }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes scaleUp {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .page-transition {
      animation: fadeSlideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
